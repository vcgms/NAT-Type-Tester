name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > NatTypeTester-Android/local.properties
          
      - name: Grant execute permission for gradlew
        run: chmod +x NatTypeTester-Android/gradlew
        
      - name: Build Release APK
        run: |
          cd NatTypeTester-Android
          ./gradlew assembleRelease --stacktrace --no-daemon
          
      - name: Sign APK
        run: |
          # 生成 debug keystore（CI 环境不存在）
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          cd NatTypeTester-Android/app/build/outputs/apk/release
          cp app-release-unsigned.apk NatTypeTester.apk
          APKSIGNER=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)apksigner
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            NatTypeTester.apk
            
      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' NatTypeTester-Android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 更新内容
            
            - 版本：v${{ steps.version.outputs.version }}
            - 构建时间：$(date '+%Y-%m-%d %H:%M:%S')
            
            ### 安装说明
            
            下载 `NatTypeTester.apk` 并安装到 Android 设备（最低支持 Android 8.0）。
          files: NatTypeTester-Android/app/build/outputs/apk/release/NatTypeTester.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
